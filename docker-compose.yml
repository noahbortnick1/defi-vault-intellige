version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: defi-vault-db
    environment:
      POSTGRES_DB: vaultdb
      POSTGRES_USER: vaultuser
      POSTGRES_PASSWORD: vaultpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vault-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: defi-vault-backend
    environment:
      ENVIRONMENT: development
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      SEED_DATA_PATH: /app/data/vaults.json
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./indexer/data:/app/data
    depends_on:
      - postgres
    networks:
      - vault-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: defi-vault-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - vault-network

volumes:
  postgres-data:

networks:
  vault-network:
    driver: bridge
